name: delivery_api QA

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: delivery-api-qa
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

  deploy_qa:
    name: Deploy API to QA VPS
    needs: verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: qa
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect DB related changes
        id: db_changes
        run: |
          set -e
          BASE_SHA=""
          if [ "${{ github.event_name }}" = "push" ] \
            && [ -n "${{ github.event.before }}" ] \
            && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="${{ github.event.before }}"
          else
            BASE_SHA="$(git rev-parse HEAD~1 2>/dev/null || true)"
          fi

          if [ -z "$BASE_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BASE_SHA" "${{ github.sha }}")
          if echo "$CHANGED" | grep -Eq '^(migrations/|src/.+\.entity\.ts$|ormconfig.*\.ts$)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 15 -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts || true

      - name: Write .env on VPS
        run: |
          echo "${{ secrets.API_QA_ENV_FILE_B64 }}" \
            | base64 -d \
            | ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -p "${{ secrets.VPS_PORT }}" \
                "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
                "cat > ${{ secrets.API_QA_ENV_PATH }}"

      - name: Sync source to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -p ${{ secrets.VPS_PORT }}" \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude ".env*" \
            ./ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.API_QA_PATH }}/"

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "${{ secrets.API_QA_DEPLOY_COMMAND }}"

      - name: Run migrations (only when DB files changed)
        if: steps.db_changes.outputs.changed == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "${{ secrets.API_QA_MIGRATE_COMMAND }}"

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "curl -fSL --retry 10 --retry-delay 6 --retry-connrefused ${{ secrets.API_QA_HEALTH_URL }}"
