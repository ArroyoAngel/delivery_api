name: delivery_api QA

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: delivery-api-qa
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

  deploy_qa:
    name: Deploy API to Hostinger VPS (QA)
    needs: verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: qa
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          if [ -n "${{ secrets.VPS_SSH_KEY_B64 }}" ]; then
            printf '%s' "${{ secrets.VPS_SSH_KEY_B64 }}" | base64 --decode > ~/.ssh/deploy_key || {
              echo "VPS_SSH_KEY_B64 is not valid Base64."
              exit 1
            }
          else
            printf '%s' "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          grep -q "BEGIN OPENSSH PRIVATE KEY" ~/.ssh/deploy_key || {
            echo "Decoded SSH key is not an OpenSSH private key. Check VPS_SSH_KEY_B64 or VPS_SSH_KEY."
            exit 1
          }
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null || {
            echo "SSH private key could not be parsed. Check VPS_SSH_KEY_B64 or VPS_SSH_KEY."
            exit 1
          }
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync backend source to VPS
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o IdentitiesOnly=yes -p ${{ secrets.VPS_PORT }}"
          rsync -az --delete \
            -e "ssh $SSH_OPTS" \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "dist" \
            ./ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.API_QA_PATH }}/"

      - name: Deploy + migrate on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
          set -e
          cd "${{ secrets.API_QA_PATH }}"
          ${{ secrets.API_QA_DEPLOY_COMMAND }}
          ${{ secrets.API_QA_MIGRATE_COMMAND }}
          EOF

      - name: API smoke check
        env:
          API_QA_HEALTH_URL: ${{ secrets.API_QA_HEALTH_URL }}
        run: |
          if [ -z "$API_QA_HEALTH_URL" ]; then
            echo "API_QA_HEALTH_URL not set. Skipping smoke check."
            exit 0
          fi
          echo "Checking $API_QA_HEALTH_URL"
          curl -fSL --retry 8 --retry-delay 5 "$API_QA_HEALTH_URL" > /dev/null
